---
layout: default
---
<article class="post">
  {% if page.cover_image %}
    <figure class="cover-image-wrapper{% if page.url == '/' %} cover-image-wrapper-home{% endif %}">
      <img
        src="{{ page.cover_image | relative_url }}"
        alt="{{ page.cover_image_alt | default: page.title | escape }}"
        class="cover-image"
        loading="lazy"
      >
    </figure>
  {% endif %}

  <header class="post-header">
    <h1 class="post-title">{{ page.title | escape }}</h1>
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
