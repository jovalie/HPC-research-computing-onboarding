<link id="fa-stylesheet" rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7.0.0/css/all.min.css">

<footer class="site-footer h-card">
    <data class="u-url" value="{{ '/' | relative_url }}"></data>

    <div class="wrapper">

        <!-- <h2 class="footer-heading">{{ site.title }}</h2> -->

        <div class="footer-col-wrapper">
            <div class="footer-col footer-col-1">
                <ul class="contact-list">
                    <li class="p-name">{{ site.footer_address }}</li>
                    <li class="p-name">{{ site.footer_email }}</li>
                </ul>
            </div>

            <div class="footer-col footer-col-2">
                <ul class="social-media-list"></ul>
            </div>

            <div class="footer-col footer-col-3">
                <p>{{ site.description }}</p>
            </div>
        </div>

</footer>
